name: Poll Gem for Hires

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gem poll
        run: |
          curl -s -X GET \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            "https://hire-bot-032u.onrender.com/poll-gem" | cat
